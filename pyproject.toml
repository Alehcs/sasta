[tool.ruff]
target-version = "py312"
line-length = 100
include = [
    "src/**/*.py",
    "tests/**/*.py",
    "scripts/**/*.py",
    "app_streamlit.py",
]
extend-exclude = [
    ".git",
    ".pytest_cache",
    ".venv",
    "__pycache__",
    "docs",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "C90"]
ignore = []

[tool.ruff.lint.mccabe]
max-complexity = 12

[tool.coverage.run]
branch = true
relative_files = true
source = ["src", "scripts"]

[tool.coverage.report]
show_missing = true
skip_empty = true

[tool.coverage.xml]
output = "coverage.xml"
